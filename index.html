<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cancionero – Señor Cautivo de Ayabaca</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #f5f0e8;
      color: #2c1a0e;
      min-height: 100vh;
      padding: 1rem;
    }

    .page { max-width: 700px; margin: 0 auto; }

    .header {
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
      background: #7a1c1c;
      color: #fff;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .header .cruz { font-size: 28px; margin-bottom: 0.5rem; }
    .header h1 { font-size: 24px; }
    .header p { font-size: 14px; opacity: 0.85; }

    .search-wrap { margin-bottom: 1.25rem; position: relative; }

    .search-wrap input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      border: 1px solid #c9b89a;
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
    }

    .count {
      font-size: 13px;
      color: #7a6050;
      margin-bottom: 1rem;
    }

    .song-card {
      background: #fff;
      border: 1px solid #d9c9b0;
      border-radius: 12px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .song-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0.9rem 1.25rem;
      cursor: pointer;
    }

    .song-num {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #7a1c1c;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 13px;
      font-weight: bold;
    }

    .song-title { flex: 1; font-weight: bold; }

    .chevron { transition: 0.2s; }

    .song-header.open .chevron {
      transform: rotate(180deg);
    }

    .song-body {
      display: none;
      border-top: 1px solid #e8dcc8;
      padding: 1.25rem 1.5rem;
    }

    .song-body.open { display: block; }

    .section-label {
      font-size: 11px;
      font-weight: bold;
      color: #7a1c1c;
      margin: 1rem 0 0.35rem;
    }

    .lyrics-line {
      font-size: 14.5px;
      line-height: 1.8;
    }

    .bis {
      font-size: 12px;
      color: #a08060;
      font-style: italic;
    }

    iframe {
      margin-top: 1rem;
      border-radius: 10px;
    }

    .no-video {
      margin-top: 1rem;
      padding: 0.8rem;
      border: 1px dashed #d9c9b0;
      text-align: center;
      font-size: 13px;
      color: #a08060;
    }

    @media (max-width: 480px) {
      .header h1 { font-size: 20px; }
      .lyrics-line { font-size: 14px; }
    }
  </style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="cruz">✝</div>
    <h1>Señor Cautivo de Ayabaca</h1>
    <p>Cancionero devocional</p>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar canción..." oninput="filterSongs()" />
  </div>

  <p class="count" id="count"></p>

  <div id="songList"></div>

</div>

<script>

const songs = [
{
  num: 55,
  title: "Peregrino",
  timestamp: "0:29:07",
  youtubeUrl: "https://www.youtube.com/watch?v=fMFBgO17BaA&t=1747s",
  sections: [
    {
      label: "Estrofa 1",
      lines: [
        "Peregrino que va por el mundo",
        "buscando el camino de mi señor",
        "y la angustia de ver a cautivo",
        "para pedirle su bendición"
      ],
      bis: false
    },
    {
      label: "Estrofa 2",
      lines: [
        "Peregrino que desde muy lejos",
        "hemos venido a ver al señor",
        "cruzando muchos desiertos",
        "con sus maderos para el señor"
      ],
      bis: true
    },
    {
      label: "Estribillo",
      lines: [
        "Peregrino porque caminas",
        "a donde quieres llegar?",
        "Voy en busca de mi Cautivo",
        "que lo quiero venerar"
      ],
      bis: true
    },
    {
      label: "Estrofa 3",
      lines: [
        "Peregrino que alegre viene",
        "va llegando a mi cautivo",
        "Peregrino que va llegando",
        "a la fiesta de mi Cautivo"
      ],
      bis: true
    }
  ]
}
];

function buildSongs(list) {
  const container = document.getElementById("songList");
  container.innerHTML = "";

  document.getElementById("count").textContent =
    list.length + " canciones";

  list.forEach(song => {

    let mediaHtml = "";

    if (song.youtubeUrl) {

      const videoId = song.youtubeUrl.split("v=")[1].split("&")[0];

      let startSeconds = 0;
      if (song.timestamp) {
        const parts = song.timestamp.split(":").map(Number);
        if (parts.length === 3) {
          startSeconds = parts[0]*3600 + parts[1]*60 + parts[2];
        } else {
          startSeconds = parts[0]*60 + parts[1];
        }
      }

      mediaHtml = `
        <iframe width="100%" height="250"
          src="https://www.youtube.com/embed/${videoId}?start=${startSeconds}"
          frameborder="0"
          allow="autoplay; encrypted-media"
          allowfullscreen>
        </iframe>
      `;
    } else {
      mediaHtml = `<div class="no-video">Sin video disponible</div>`;
    }

    const sectionsHtml = song.sections.map(s => `
      <p class="section-label">${s.label}</p>
      ${s.lines.map(l => `<p class="lyrics-line">${l}</p>`).join("")}
      ${s.bis ? `<p class="bis">(bis)</p>` : ""}
    `).join("");

    const card = document.createElement("div");
    card.className = "song-card";

    card.innerHTML = `
      <div class="song-header" onclick="toggle(this)">
        <div class="song-num">${song.num}</div>
        <div class="song-title">${song.title}</div>
        <div class="chevron">▾</div>
      </div>

      <div class="song-body">
        ${sectionsHtml}
        ${mediaHtml}
      </div>
    `;

    container.appendChild(card);
  });
}

function toggle(header) {
  const body = header.nextElementSibling;

  const allBodies = document.querySelectorAll(".song-body");
  const allHeaders = document.querySelectorAll(".song-header");

  // 🔥 PAUSAR TODOS los videos al cerrar
  allBodies.forEach(b => {
    const iframe = b.querySelector("iframe");
    if (iframe) {
      iframe.src = iframe.src; // reinicia (pausa)
    }
    b.classList.remove("open");
  });

  allHeaders.forEach(h => h.classList.remove("open"));

  body.classList.add("open");
  header.classList.add("open");
}

function filterSongs() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  const filtered = songs.filter(s =>
    s.title.toLowerCase().includes(q)
  );

  buildSongs(filtered);
}

buildSongs(songs);

</script>

</body>
</html>
