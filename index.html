<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cancionero Señor Cautivo</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Georgia, serif;
  background: #f5f0e8;
  color: #2c1a0e;
  padding: 1rem;
}

.page { max-width: 800px; margin: auto; }

.header {
  text-align: center;
  padding: 2rem;
  background: #7a1c1c;
  color: white;
  border-radius: 12px;
  margin-bottom: 1rem;
}

.search {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.song-card {
  background: white;
  border-radius: 10px;
  margin-bottom: 10px;
  border: 1px solid #ddd;
  overflow: hidden;
}

.song-header {
  padding: 12px;
  cursor: pointer;
  display: flex;
  gap: 10px;
  align-items: center;
}

.num {
  background: #7a1c1c;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

.song-body {
  display: none;
  padding: 12px;
  border-top: 1px solid #eee;
}

.song-body.open { display: block; }

.lyric {
  font-size: 14px;
  line-height: 1.7;
}

audio {
  width: 100%;
  margin-top: 10px;
}

.small {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<div class="page">

<div class="header">
<h1>✝ Cancionero Señor Cautivo ✝</h1>
</div>

<input class="search" id="search" placeholder="Buscar canción..." oninput="render()"/>

<div id="list"></div>

</div>

<script>

const songs = [

/* =========================
   01 - HIMNO
========================= */
{
num: 1,
title: "HIMNO",
audio: "",
start: "",
lyrics: [
"Jesucristo Cautivo Ayabaca",
"hoy te aclama con gran devoción.",
"Tú eres Dios hijo amado del padre",
"y del hombre eres tú el Salvador.",
"Peregrinos de un pueblo que marcha",
"a la patria del cielo hacia Dios."
]
},

/* =========================
   02 - CÁNTALE
========================= */
{
num: 2,
title: "CÁNTALE",
audio: "",
start: "",
lyrics: [
"Cántale, cántale, cántale a mi cautivo",
"Cántale, cántale, cántale al peregrino",
"Y con las palmas te alabaré",
"y con mi voz te avivaré"
]
},

/* =========================
   03 - FIESTA DE MI CAUTIVO
========================= */
{
num: 3,
title: "FIESTA DE MI CAUTIVO",
audio: "",
start: "",
lyrics: [
"Fiesta de mi cautivo",
"Fiesta de mi señor",
"Todos los peregrinos",
"Te cantan con amor",
"Ampollas y dolores",
"Todo soporto yo",
"Para ver a mi cautivo",
"Que de fiesta se encuentra hoy"
]
},

/* =========================
   54 - PEREGRINO (COMPLETO)
========================= */
{
num: 54,
title: "PEREGRINO",
audio: "",
start: "",
lyrics: [
"Peregrino que va por el mundo",
"buscando el camino de mi señor",
"y la angustia de ver a cautivo",
"para pedirle su bendición",
"Peregrino que desde muy lejos",
"hemos venido a ver al señor",
"cruzando muchos desiertos",
"con sus maderos para el señor",
"Peregrino porque caminas",
"a donde quieres llegar?",
"Voy en busca de mi Cautivo",
"que lo quiero venerar",
"Peregrino que alegre viene",
"va llegando a mi cautivo",
"Peregrino que va llegando",
"a la fiesta de mi Cautivo"
]
},

/* =========================
   55 - SE VA LA HERMANDAD
========================= */
{
num: 55,
title: "SE VA LA HERMANDAD",
audio: "",
start: "",
lyrics: [
"Se va, se va la hermandad",
"se va pero volverá",
"Las penas que llevo en el alma",
"es una pena tan cruel",
"Solo le pido al Cautivo",
"que no se olvide de mí",
"Yo sufriré y lloraré",
"hasta llegar a verte"
]
},

/* =========================
   56 - BELLA NOCHE
========================= */
{
num: 56,
title: "BELLA NOCHE",
audio: "",
start: "",
lyrics: [
"Una bella noche yo tuve un sueño",
"con un ángel donde me decía",
"que en Ayabaca estabas tú",
"yo me desperté y caminé hacia ti",
"y de tus ojitos negritos",
"yo me enamoré"
]
}

];

function render(){

const q = document.getElementById("search").value.toLowerCase();
const container = document.getElementById("list");
container.innerHTML = "";

songs
.filter(s => s.title.toLowerCase().includes(q))
.forEach(s => {

const lyricsHTML = s.lyrics.map(l => `<div class="lyric">${l}</div>`).join("");

let audioHTML = "";

if(s.audio){
audioHTML = `
<audio controls>
<source src="${s.audio}" type="audio/mpeg">
</audio>
<p class="small">Inicio: ${s.start || "0:00"}</p>
`;
} else {
audioHTML = `<p class="small">🎵 Agrega audio luego</p>`;
}

const card = document.createElement("div");
card.className = "song-card";

card.innerHTML = `
<div class="song-header" onclick="toggle(this)">
<div class="num">${s.num}</div>
<div>${s.title}</div>
</div>

<div class="song-body">
${lyricsHTML}
${audioHTML}
</div>
`;

container.appendChild(card);

});

}

function toggle(el){
const body = el.nextElementSibling;
document.querySelectorAll(".song-body").forEach(b => b.classList.remove("open"));
body.classList.toggle("open");
}

render();

</script>

</body>
</html>
